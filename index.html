<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./img/vishal.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Vishaleeswaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Boldonse&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"></script>
    <script type="module" src="./script.js"></script>
    <!-- Active Nav Script -->
    <script>
        $(window).scroll(function() {
            var scrollPos = $(window).scrollTop() + 70;
            $('.navbar-nav .nav-link').each(function() {
                var link = $(this);
                var section = $(link.attr('href'));
                if (section.length && section.position().top <= scrollPos && section.position().top + section.height() > scrollPos) {
                    $('.navbar-nav .nav-link').removeClass('active');
                    link.addClass('active');
                }
            });
        });
    </script>

    <!-- Filter Projects -->
    <script>
        $('.project-btn').click(function() {
            $('.project-btn').removeClass('active');
            $(this).addClass('active');
            
            var filter = $(this).data('filter');
            $('.project-item').each(function() {
                if (filter === 'all' || $(this).data('category') === filter) {
                    $(this).fadeIn(300);
                } else {
                    $(this).fadeOut(300);
                }
            });
        });
    </script>
  </body>
</html>
